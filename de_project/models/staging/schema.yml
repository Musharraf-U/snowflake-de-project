version: 2

models:
  - name: stg_orders
    columns:
      - name: order_id
        tests:
          - unique
          - not_null
      - name: customer_id
        tests:
          - not_null
      - name: order_status
        tests:
          - not_null
      - name: order_month
        tests:
          - not_null
      - name: order_year
        tests:
          - not_null
      - name: is_late_delivery
        tests:
          - not_null

  - name: stg_customers
    columns:
      - name: customer_id
        tests:
          - unique
          - not_null
      - name: customer_unique_id
        tests:
          - not_null
      - name: customer_state
        tests:
          - not_null

  - name: stg_order_items
    columns:
      - name: order_id
        tests:
          - not_null
      - name: price
        tests:
          - not_null
      - name: total_amount
        tests:
          - not_null
      - name: shipping_cost_ratio
        tests:
          - not_null